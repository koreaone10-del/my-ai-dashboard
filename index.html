<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعدي الذكي</title>
    <style>
        body { font-family: Arial; padding: 20px; background-color: #f4f4f9; }
        #chat-box { height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; background: white; margin-bottom: 10px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>لوحة تحكم الذكاء الاصطناعي</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="اكتب سؤالك هنا...">
    <button onclick="sendMessage()">إرسال</button>

    <script>
        // ضع مفتاح NVIDIA الخاص بك هنا
        const apiKey = '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'; 

        async function sendMessage() {
            const input = document.getElementById('user-input').value;
            const chatBox = document.getElementById('chat-box');
            
            chatBox.innerHTML += `<p><b>أنت:</b> ${input}</p>`;
            document.getElementById('user-input').value = '';

            const response = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "meta/llama-3.1-70b-instruct",
                    messages: [{"role": "user", "content": input}]
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            chatBox.innerHTML += `<p><b>الذكاء الاصطناعي:</b> ${aiReply}</p>`;
        }
    </script>
</body>
</html>
